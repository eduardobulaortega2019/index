<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R360 - Consulta Inteligente IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f0fdfa 100%);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
        }

        .logo-text p {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .suggestions-title {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .suggestion-btn {
            width: 100%;
            text-align: left;
            padding: 12px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            color: #374151;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            line-height: 1.3;
        }

        .suggestion-btn:hover {
            background: #e0f2fe;
            color: #0369a1;
            border-left-color: #0891b2;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            font-size: 11px;
            color: #9ca3af;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            color: white;
            padding: 20px 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
            align-items: flex-start;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 20px 32px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #0891b2;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 12px;
        }

        .doc-source {
            font-size: 11px;
            color: #0891b2;
            margin-top: 8px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-container {
                padding: 16px;
            }

            .header {
                padding: 16px;
            }

            .input-area {
                padding: 16px;
            }
        }

        .sidebar-content::-webkit-scrollbar,
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track,
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb,
        .chat-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">📚</div>
                    <div class="logo-text">
                        <h1>R360</h1>
                        <p>Consulta IA</p>
                    </div>
                </div>
            </div>

            <div class="sidebar-content" id="suggestionsContainer">
                <div class="suggestions-title">Preguntas Rápidas</div>
            </div>

            <div class="sidebar-footer">
                <p>🚀 Búsqueda Inteligente + IA</p>
                <p style="margin-top: 8px;">Respuestas Conversacionales</p>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <h2>🤖 Asistente R360 Inteligente</h2>
                <p>Pregúntame natural sobre Servicio, Ventas, Mercadeo, Fabrica o Administrador</p>
            </div>

            <div class="chat-container" id="chatContainer"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Cuéntame sobre las fases del servicio..."
                        onkeypress="if(event.key === 'Enter') sendMessage()"
                    >
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">✉️</button>
                </div>
                <div class="input-hint">
                    💡 Búsqueda automática en documentos + respuesta inteligente
                </div>
            </div>
        </div>
    </div>

    <script>
        let documentosData = null;

        // Cargar metadata desde GitHub
        async function loadDocumentsData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/eduardobulaortega2019/index/main/documentos-metadata.json');
                if (response.ok) {
                    documentosData = await response.json();
                } else {
                    documentosData = getDefaultData();
                }
            } catch (error) {
                documentosData = getDefaultData();
            }

            cargarPreguntasRapidas();
            mostrarSaludo();
        }

        // Datos por defecto
        function getDefaultData() {
            return {
                "documentos": [
                    {
                        "id": "servicio",
                        "nombre": "R360 Servicio",
                        "qa_pairs": [
                            {
                                "pregunta": "¿Cuáles son las fases del servicio?",
                                "respuesta": "El proceso de servicio R360 tiene las siguientes fases:\n\n1. **Planificación** - Análisis de necesidades del cliente\n2. **Ejecución** - Implementación del servicio\n3. **Control de Calidad** - Validación de estándares\n4. **Entrega** - Presentación al cliente\n5. **Seguimiento** - Asistencia post-servicio",
                                "palabras_clave": ["fases", "etapas", "proceso", "planificación", "ejecución", "calidad", "entrega", "seguimiento", "fase de planificación", "fase de ejecución"]
                            },
                            {
                                "pregunta": "¿Cuál es el proceso de atención al cliente?",
                                "respuesta": "El proceso de atención al cliente en R360 Servicio incluye:\n\n✓ Recepción de solicitud\n✓ Análisis de requerimiento\n✓ Asignación de recursos\n✓ Ejecución del servicio\n✓ Validación con cliente\n✓ Cierre y seguimiento\n\nTiempo de respuesta: SLA de 24 horas",
                                "palabras_clave": ["atención", "cliente", "proceso", "servicio", "sla", "respuesta", "solicitud"]
                            },
                            {
                                "pregunta": "¿Cuáles son los estándares de calidad?",
                                "respuesta": "Los estándares de calidad de R360 Servicio incluyen:\n\n📊 **Precisión:** 99.5% en entregas\n⏱️ **Puntualidad:** 100% dentro del SLA\n✓ **Conformidad:** Cumplimiento de especificaciones\n🔍 **Auditoría:** Revisiones periódicas",
                                "palabras_clave": ["calidad", "estándares", "normas", "sla", "precisión", "puntualidad", "conformidad"]
                            }
                        ]
                    },
                    {
                        "id": "ventas",
                        "nombre": "R360 Ventas",
                        "qa_pairs": [
                            {
                                "pregunta": "¿Cómo es el proceso de ventas?",
                                "respuesta": "El proceso de ventas R360 consta de:\n\n1. **Prospección** - Identificación de leads\n2. **Contacto inicial** - Primera llamada o reunión\n3. **Presentación** - Demostración del producto\n4. **Propuesta** - Envío de cotización\n5. **Negociación** - Ajuste de términos\n6. **Cierre** - Firma de contrato\n7. **Implementación** - Inicio del servicio",
                                "palabras_clave": ["proceso", "etapas", "venta", "ventas", "prospección", "contacto", "propuesta", "negociación", "cierre", "implementación"]
                            },
                            {
                                "pregunta": "¿Cómo se cierra una venta?",
                                "respuesta": "Para cerrar una venta exitosa:\n\n✓ Confirmar necesidades del cliente\n✓ Presentar propuesta clara\n✓ Resolver objeciones\n✓ Establecer términos de pago\n✓ Preparar documentación\n✓ Obtener firma\n✓ Confirmar detalles de implementación",
                                "palabras_clave": ["cierre", "venta", "negociación", "firma", "contrato", "términos", "cerrar"]
                            }
                        ]
                    },
                    {
                        "id": "mercadeo",
                        "nombre": "R360 Mercadeo",
                        "qa_pairs": [
                            {
                                "pregunta": "¿Cuál es la estrategia de mercadeo?",
                                "respuesta": "Estrategia de Mercadeo R360:\n\n🎯 **Posicionamiento:** Lider en soluciones empresariales\n👥 **Público Objetivo:** Empresas B2B (50-1000 empleados)\n📱 **Canales:** Digital (50%), Presencial (30%), Networking (20%)\n📊 **Campañas:** Lead generation, Awareness, Retention",
                                "palabras_clave": ["estrategia", "mercadeo", "marketing", "campaña", "posicionamiento", "público", "canales", "digital"]
                            }
                        ]
                    },
                    {
                        "id": "fabrica",
                        "nombre": "R360 Fabrica",
                        "qa_pairs": [
                            {
                                "pregunta": "¿Cómo funciona la producción?",
                                "respuesta": "Proceso de Producción R360:\n\n1. **Recepción de Orden** - Planning\n2. **Abastecimiento** - Compra de materiales\n3. **Preparación** - Setup de línea\n4. **Fabricación** - Proceso manufacturero\n5. **QC Intermedio** - Inspección\n6. **Acabado** - Embalaje\n7. **QC Final** - Inspección 100%\n8. **Despacho** - Entrega",
                                "palabras_clave": ["producción", "manufactura", "proceso", "fabrica", "orden", "materiales", "calidad", "despacho", "fabricación"]
                            }
                        ]
                    },
                    {
                        "id": "administrador",
                        "nombre": "Super Administrador",
                        "qa_pairs": [
                            {
                                "pregunta": "¿Cómo gestiono propiedades?",
                                "respuesta": "Gestión de Propiedades:\n\n📋 **Registro:** Información de propiedad\n👤 **Inquilinos:** Perfiles, contratos\n💰 **Alquiler:** Cobranza, pagos, recordatorios\n🔧 **Mantenimiento:** Solicitudes, órdenes\n📊 **Reportes:** Ocupación, ingresos, gastos",
                                "palabras_clave": ["gestión", "propiedades", "administración", "inquilino", "alquiler", "cobranza", "mantenimiento"]
                            }
                        ]
                    }
                ],
                "preguntas_rapidas": [
                    "¿Cuáles son las fases del servicio?",
                    "¿Cómo es el proceso de ventas?",
                    "¿Cuál es la estrategia de mercadeo?",
                    "¿Cómo funciona la producción?",
                    "¿Cómo gestiono propiedades?"
                ]
            };
        }

        // Mostrar saludo inicial (estilo paisa)
        function mostrarSaludo() {
            const saludos = [
                "¡Ey, bienvenido! Soy su asistente R360. Cuénteme qué necesita, que yo le ayudo de una.",
                "¿Qué más, parcero? Aquí ando para ayudarle en lo que necesite de R360.",
                "¡Hola! Soy el asistente de consulta R360. Pregúnteme lo que quiera y le cuento al toque.",
                "Hermano, yo le ayudo con todo lo de R360. ¿Qué necesita saber hoy?"
            ];
            
            const saludo = saludos[Math.floor(Math.random() * saludos.length)];
            addMessage(saludo, 'bot');
        }

        // Cargar preguntas rápidas
        function cargarPreguntasRapidas() {
            const container = document.getElementById('suggestionsContainer');
            const title = container.querySelector('.suggestions-title');
            
            const oldButtons = container.querySelectorAll('.suggestion-btn');
            oldButtons.forEach(btn => btn.remove());

            documentosData.preguntas_rapidas.forEach(pregunta => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = pregunta;
                btn.onclick = () => setQuestion(pregunta);
                container.appendChild(btn);
            });
        }

        // Buscar documento relevante
        function buscarDocumento(pregunta) {
            const preguntaLower = pregunta.toLowerCase();
            let mejorCoincidencia = null;
            let maxCoincidencias = 0;

            documentosData.documentos.forEach(doc => {
                doc.qa_pairs.forEach(qa => {
                    let coincidencias = 0;
                    qa.palabras_clave.forEach(palabra => {
                        if (preguntaLower.includes(palabra)) {
                            coincidencias++;
                        }
                    });

                    if (coincidencias > maxCoincidencias) {
                        maxCoincidencias = coincidencias;
                        mejorCoincidencia = { doc, qa, coincidencias };
                    }
                });
            });

            return mejorCoincidencia;
        }

        // Generar respuesta conversacional
        function generarRespuestaConversacional(pregunta, contexto) {
            const palabrasIniciales = [
                "Dale, ahí voy. ",
                "Claro que sí. ",
                "Ey, acá está. ",
                "Vea, esto es lo que tengo: ",
                "Perfecto, le cuento: ",
                "Listo, escúcheme: "
            ];

            const conectores = [
                "\nBasado en los documentos R360, ",
                "\nEsto es lo que dice el documento: ",
                "\nSegún la información que tenemos, ",
                "\nAcá está la información que necesita: "
            ];

            const inicio = palabrasIniciales[Math.floor(Math.random() * palabrasIniciales.length)];
            const conector = conectores[Math.floor(Math.random() * conectores.length)];

            if (contexto) {
                return inicio + conector + contexto;
            } else {
                return "Hmm, eso sí es una buena pregunta, pero no me aparece en los libros que tengo. ¿Me pregunta de otra cosa?";
            }
        }

        // Enviar mensaje
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            showTypingIndicator();
            
            setTimeout(() => {
                removeTypingIndicator();
                
                // Buscar en documentos
                const resultado = buscarDocumento(message);
                
                if (resultado && resultado.coincidencias > 0) {
                    // Generar respuesta conversacional
                    const respuesta = generarRespuestaConversacional(message, resultado.qa.respuesta);
                    addMessage(respuesta, 'bot');
                    
                    // Mostrar fuente del documento
                    const chatContainer = document.getElementById('chatContainer');
                    const lastMessage = chatContainer.lastChild;
                    const sourceDiv = document.createElement('div');
                    sourceDiv.className = 'doc-source';
                    sourceDiv.textContent = `📖 Información de: ${resultado.doc.nombre}`;
                    lastMessage.appendChild(sourceDiv);
                } else {
                    // Respuesta cuando no encuentra
                    const respuestaDefault = [
                        "Ey, eso no lo tengo en los documentos. ¿Pregúnteme de Servicio, Ventas, Mercadeo, Fabrica o Administrador?",
                        "Parcero, eso no sale en lo que tengo. ¿Algo de los documentos R360?",
                        "Hmm, eso sí no me aparece. ¿Algo más que necesite saber?"
                    ];
                    addMessage(respuestaDefault[Math.floor(Math.random() * respuestaDefault.length)], 'bot');
                }
            }, 800);
        }

        // Agregar mensaje
        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Mostrar indicador de escritura
        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typingIndicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'typing-indicator';
            contentDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function setQuestion(question) {
            document.getElementById('messageInput').value = question;
            document.getElementById('messageInput').focus();
            sendMessage();
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            loadDocumentsData();
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
