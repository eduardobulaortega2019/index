<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R360 - Asistente Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f0fdfa 100%);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
        }

        .logo-text p {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .suggestions-title {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 12px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .suggestion-btn {
            width: 100%;
            text-align: left;
            padding: 10px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border: none;
            border-radius: 6px;
            color: #374151;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            line-height: 1.2;
        }

        .suggestion-btn:hover {
            background: #e0f2fe;
            color: #0369a1;
            border-left-color: #0891b2;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            font-size: 11px;
            color: #9ca3af;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            color: white;
            padding: 16px 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            font-size: 14px;
        }

        .source-info {
            font-size: 11px;
            color: #0891b2;
            margin-top: 6px;
            font-style: italic;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-area {
            padding: 16px 32px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #0891b2;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.4);
        }

        .input-hint {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .message-content { max-width: 85%; }
            .chat-container { padding: 16px; }
            .header { padding: 12px; }
            .input-area { padding: 12px; }
        }

        .sidebar-content::-webkit-scrollbar,
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-thumb,
        .chat-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">💬</div>
                    <div class="logo-text">
                        <h1>R360</h1>
                        <p>Asistente IA</p>
                    </div>
                </div>
            </div>

            <div class="sidebar-content" id="suggestionsContainer">
                <div class="suggestions-title">Preguntas</div>
            </div>

            <div class="sidebar-footer">
                <p>🚀 Búsqueda Inteligente</p>
                <p style="margin-top: 8px;">Respuestas Detalladas</p>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <h2>🤖 R360 Inteligente</h2>
                <p>Pregúntame natural sobre cualquier proceso</p>
            </div>

            <div class="chat-container" id="chatContainer"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Ej: Cuéntame en detalle cómo es la fase de planificación..."
                        onkeypress="if(event.key === 'Enter') sendMessage()"
                    >
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
                <div class="input-hint">💡 Pregunta natural, búsqueda inteligente, respuestas detalladas</div>
            </div>
        </div>
    </div>

    <script>
        let documentosData = null;

        // Cargar metadata desde GitHub
        async function loadDocumentsData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/eduardobulaortega2019/index/main/documentos-metadata.json');
                if (response.ok) {
                    documentosData = await response.json();
                } else {
                    documentosData = getDefaultData();
                }
            } catch (error) {
                documentosData = getDefaultData();
            }

            cargarPreguntasRapidas();
            mostrarSaludo();
        }

        function getDefaultData() {
            return {
                "documentos": [
                    {
                        "id": "servicio",
                        "nombre": "R360 Servicio",
                        "contenido_completo": "El proceso de servicio R360 consta de 5 fases: Planificación (3-5 días), Ejecución (1-4 semanas), Control de Calidad (2-5 días), Entrega y Seguimiento.",
                        "qa_pairs": [
                            {
                                "pregunta": "fases del servicio",
                                "respuesta": "Las 5 fases son: 1) Planificación - Análisis de necesidades, 2) Ejecución - Implementación, 3) Control de Calidad - Validación, 4) Entrega - Presentación, 5) Seguimiento - Post-servicio."
                            }
                        ]
                    },
                    {
                        "id": "ventas",
                        "nombre": "R360 Ventas",
                        "contenido_completo": "Proceso de ventas: Prospección, Contacto, Presentación, Propuesta, Negociación, Cierre e Implementación. Dura 30-45 días.",
                        "qa_pairs": []
                    },
                    {
                        "id": "mercadeo",
                        "nombre": "R360 Mercadeo",
                        "contenido_completo": "Estrategia B2B enfocada en empresas medianas. Canales: 50% digital, 30% presencial, 20% networking.",
                        "qa_pairs": []
                    },
                    {
                        "id": "fabrica",
                        "nombre": "R360 Fabrica",
                        "contenido_completo": "8 fases de producción: Recepción, Abastecimiento, Preparación, Fabricación, QC, Acabado, QC Final, Despacho. 500 unidades/día.",
                        "qa_pairs": []
                    },
                    {
                        "id": "administrador",
                        "nombre": "Super Administrador",
                        "contenido_completo": "Plataforma para gestión de propiedades, inquilinos, cobranza, mantenimiento, reportes. Unlimited propiedades.",
                        "qa_pairs": []
                    }
                ]
            };
        }

        function mostrarSaludo() {
            const saludos = [
                "¡Ey, bienvenido! Soy el asistente de R360. Pregúntame lo que necesites y te ayudo al toque.",
                "¿Qué más, parcero? Aquí estoy para ayudarte con cualquier cosa de R360.",
                "¡Hola! Soy el asistente inteligente de R360. Cuéntame qué necesitas saber.",
                "Hermano, bienvenido. Yo respondo todas tus preguntas sobre R360. ¿Qué quieres saber?"
            ];
            addMessage(saludos[Math.floor(Math.random() * saludos.length)], 'bot');
        }

        function cargarPreguntasRapidas() {
            const container = document.getElementById('suggestionsContainer');
            const preguntas = [
                "¿Cuáles son las fases?",
                "Detalle del proceso",
                "¿Cómo comienza?",
                "Paso a paso",
                "¿Cuánto tarda?",
                "Explícame todo"
            ];

            const oldButtons = container.querySelectorAll('.suggestion-btn');
            oldButtons.forEach(btn => btn.remove());

            preguntas.forEach(pregunta => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = pregunta;
                btn.onclick = () => {
                    document.getElementById('messageInput').value = pregunta;
                    document.getElementById('messageInput').focus();
                    sendMessage();
                };
                container.appendChild(btn);
            });
        }

        // Búsqueda inteligente mejorada
        function buscarContenido(pregunta) {
            const preguntaLower = pregunta.toLowerCase();
            let mejorCoincidencia = null;
            let maxScore = 0;

            documentosData.documentos.forEach(doc => {
                let score = 0;

                // Buscar en contenido completo
                if (doc.contenido_completo) {
                    const contenidoLower = doc.contenido_completo.toLowerCase();
                    const palabrasPregunta = preguntaLower.split(' ');
                    
                    palabrasPregunta.forEach(palabra => {
                        if (palabra.length > 2) { // Ignorar palabras muy cortas
                            if (contenidoLower.includes(palabra)) {
                                score += 2;
                            }
                        }
                    });
                }

                // Buscar en Q&A pairs
                if (doc.qa_pairs) {
                    doc.qa_pairs.forEach(qa => {
                        const palabrasPregunta = preguntaLower.split(' ');
                        palabrasPregunta.forEach(palabra => {
                            if (qa.pregunta && qa.pregunta.toLowerCase().includes(palabra)) {
                                score += 3;
                            }
                            if (qa.respuesta && qa.respuesta.toLowerCase().includes(palabra)) {
                                score += 2;
                            }
                        });
                    });
                }

                // Buscar por nombre del documento
                if (doc.nombre.toLowerCase().includes(preguntaLower)) {
                    score += 5;
                }

                if (score > maxScore) {
                    maxScore = score;
                    mejorCoincidencia = { doc, score };
                }
            });

            return maxScore > 0 ? mejorCoincidencia : null;
        }

        // Generar respuesta natural
        function generarRespuesta(pregunta, doc) {
            const preguntaLower = pregunta.toLowerCase();
            
            // Detectar si pide detalle
            const pideDetalle = preguntaLower.includes('detalle') || 
                               preguntaLower.includes('explica') || 
                               preguntaLower.includes('paso a paso') ||
                               preguntaLower.includes('en profundidad') ||
                               preguntaLower.includes('completo');

            const iniciadores = [
                "Dale, acá te cuento. ",
                "Claro, vea. ",
                "Perfectamente. ",
                "Listo, escúcheme. ",
                "Ey, esto es lo que tengo: "
            ];

            const inicio = iniciadores[Math.floor(Math.random() * iniciadores.length)];

            // Si pide detalle, usar contenido completo
            if (pideDetalle && doc.contenido_completo) {
                return inicio + doc.contenido_completo;
            }

            // Si hay Q&A que coincida, usarlo
            if (doc.qa_pairs && doc.qa_pairs.length > 0) {
                let mejorQA = null;
                let maxMatch = 0;

                doc.qa_pairs.forEach(qa => {
                    let matches = 0;
                    const palabrasPregunta = preguntaLower.split(' ');
                    palabrasPregunta.forEach(palabra => {
                        if (qa.pregunta.toLowerCase().includes(palabra)) {
                            matches += 2;
                        }
                    });
                    
                    if (matches > maxMatch) {
                        maxMatch = matches;
                        mejorQA = qa;
                    }
                });

                if (mejorQA && maxMatch > 0) {
                    return inicio + mejorQA.respuesta;
                }
            }

            // Fallback: usar contenido completo
            if (doc.contenido_completo) {
                return inicio + doc.contenido_completo;
            }

            return null;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            showTypingIndicator();
            
            setTimeout(() => {
                removeTypingIndicator();
                
                const resultado = buscarContenido(message);
                
                if (resultado && resultado.score > 0) {
                    const respuesta = generarRespuesta(message, resultado.doc);
                    if (respuesta) {
                        addMessageWithSource(respuesta, resultado.doc.nombre);
                    } else {
                        addMessage("Hmm, no pude generar una respuesta apropiada. ¿Preguntame de otra forma?", 'bot');
                    }
                } else {
                    const respuestasDefault = [
                        "Ey, eso no lo tengo bien documentado. ¿Pregúntame de Servicio, Ventas, Mercadeo, Fabrica o Administrador?",
                        "Parcero, eso sí no sale en los documentos. ¿Algo de R360?",
                        "Hmm, eso está fuera de mi alcance. ¿Pregúntame de otro tema?"
                    ];
                    addMessage(respuestasDefault[Math.floor(Math.random() * respuestasDefault.length)], 'bot');
                }
            }, 600);
        }

        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessageWithSource(text, docName) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            const sourceDiv = document.createElement('div');
            sourceDiv.className = 'source-info';
            sourceDiv.textContent = `📖 Fuente: ${docName}`;
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(sourceDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typingIndicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'typing-indicator';
            contentDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadDocumentsData();
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
